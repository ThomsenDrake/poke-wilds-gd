# CROSS-SUBSYSTEM CO-MODIFICATION: crafting extends building_loop's
# scripts/domain/structures.gd (the torch structure appended LAST to IDS so existing
# build-cycle indices stay stable, the _CAMPFIRE_LIT_REGION + LIGHT_SOURCES
# constants, and a lit parameter on sprite_region_for defaulting true) and its
# scripts/app/field_action_router.gd (Z-precedence: faced campfire -> CampMenu
# (Craft / Extinguish-or-Light / Demolish), faced bed -> direct rest("bed"),
# everything else -> the existing harvest/demolish path — demolition STAYS reachable
# via the menu entry so the region-seal escape the building spec's witness invariant
# depends on is preserved; placement_flow/placement_flow_demolition call
# build_runtime.try_demolish directly and stay green regardless of router
# precedence). scripts/ui/bag_screen.gd (menu_ui-owned) gains the sleeping_bag
# _activate_item branch. The lit field rides building_loop's placement entry:
# world_overrides.gd / world_generator.gd / session_state.gd stay OWNED BY
# world_runtime / session_runtime (one owner per file) — is_valid_placement checks
# only kind + structure_id, so the extra "lit" key round-trips save/normalize/merge
# untouched with ZERO validator changes. material_dropped is emitted by
# game_runtime.gd (session_runtime-owned) on battle victory/capture — the interim
# type-drop table (material_drops.gd) NEVER contains log or hard_stone so the
# building_loop demolition-witness invariant holds (placement_flow asserts it every
# run). The CampMenu node lives in scenes/app/Main.tscn (app_bootstrap-owned scene)
# and self-wires via the /root/GameRuntime autoload convention; the ui scene
# references ui only per check_architecture. See
# docs/product-specs/camping-crafting-survival.md.
