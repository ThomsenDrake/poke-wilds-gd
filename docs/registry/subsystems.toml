# CROSS-SUBSYSTEM CO-MODIFICATION: camping_loop EXTENDS four budget-owned files by
# EXTRACTION + same-line edit only, never by growth — scripts/runtime/game_runtime.gd
# (session_runtime-owned, stays AT the 320 budget: the campsite accessors and the
# encounter level/fallback helpers move OUT into camping_runtime.gd /
# encounter_selection.gd FIRST (one-line forwarders, static call sites), freeing the
# lines the night-delegation + drop-grant wiring, the placed_structures() accessor
# for the light model, and the _retreat_allowed forwarder passed as a Callable into
# battle_runtime.setup then spend); scripts/runtime/battle_runtime.gd
# (battle_loop-owned, stays WITHIN 320: the one-line _move_priority moves into
# battle_rules.gd as static BattleRules.move_priority, paying for the same-line
# evolution time-context argument at _try_evolve and the injected retreat_check
# callable in run_from_battle; blackout returns to campsite_tile instead of
# Vector2i.ZERO on the SAME line); the lit light-source GLOW composes INSIDE
# building_loop's scripts/runtime/structure_layer.gd (the design's documented
# fallback path — one static generated gradient per lit campfire/torch in the
# visible window, night-only, no per-frame animation, refreshed on
# world_overridden + player tile change — so world_view.gd and main.gd stay
# untouched); and scripts/runtime/session_state.gd (session_runtime-owned:
# STARTING_BAG +=
# sleeping_bag plus the one-line time_of_day_label() delegation the evolution fix
# reads, -> ~300/320; rest only WRITES the existing
# campsite_x/campsite_y/time_of_day_minutes vars — zero new API). scripts/domain/
# biome_encounters.gd (world_runtime-owned) gains the additive time_of_day filter
# parameter (default "DAY" keeps the existing caller compiling), scripts/app/main.gd
# (app_bootstrap-owned, 220/220) gets exactly ONE same-line edit (the
# _field_router.setup argument passing the $UI/CampMenu node; the defeat-toast
# wording is unchanged), and scripts/domain/pokemon_rules.gd
# (pokemon_progression-owned) stays UNTOUCHED at 320/320 (the evolution fix is
# caller-side; the empty-context fail-open stays with a documented guarantee). The
# lit state of a placed campfire is an additive "lit" field on the placement entry —
# co-owned with building_loop's structures map: world_overrides.is_valid_placement
# checks only kind + structure_id so the extra key round-trips untouched (see the
# crafting subsystem note below). DayPhase (day_phase.gd) is the single day/night
# source of truth mirroring world_view's TIME_OF_DAY_KEYFRAMES; night_cycle asserts
# the boundary minutes agree with the tint keyframes so the duplication cannot drift
# silently. See docs/product-specs/camping-crafting-survival.md.

