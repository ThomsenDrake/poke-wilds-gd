name: repo-contracts

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
    paths:
      - ".github/workflows/**"
      - ".gitignore"
      - ".gitmodules"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "README.md"
      - "docs/**"
      - "project.godot"
      - "scenes/**"
      - "scripts/**"
      - "tools/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".gitignore"
      - ".gitmodules"
      - "AGENTS.md"
      - "ARCHITECTURE.md"
      - "README.md"
      - "docs/**"
      - "project.godot"
      - "scenes/**"
      - "scripts/**"
      - "tools/**"

concurrency:
  group: repo-contracts-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-contracts:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 tools/check_repo_contracts.py
      - run: python3 tools/check_architecture.py
      - run: python3 tools/check_quality_docs.py
      - if: github.event_name == 'pull_request'
        run: python3 tools/check_change_contract.py --base origin/${{ github.base_ref }}
